apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-deployment
  labels: 
    app: python
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python
  template:
    metadata:
      labels:
        app: python
    spec:
      containers:
      - name: python-container
        image: devopscontainerregistry.azurecr.io/app:4eb94ada186a7b48a8978351e9c385502ce5b837
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: acr-secret
